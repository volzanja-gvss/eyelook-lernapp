<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eyelook AG — Bilanz- & Erfolgsanalyse</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ── TOKENS ── */
:root {
  --ink:    #18181B;
  --ink2:   #52525B;
  --ink3:   #A1A1AA;
  --paper:  #FFFFFF;
  --paper2: #F4F4F5;
  --paper3: #FAFAFA;
  --border: #E4E4E7;
  --border2:#D4D4D8;

  /* Module colours */
  --bilanz: #1D4ED8;
  --bilanz-light: #EFF6FF;
  --bilanz-mid:   #BFDBFE;
  --erfolg: #065F46;
  --erfolg-light: #ECFDF5;
  --erfolg-mid:   #A7F3D0;

  /* Semantic */
  --gut:     #15803D; --gut-bg:   #F0FDF4;
  --mittel:  #B45309; --mittel-bg:#FFFBEB;
  --schlecht:#B91C1C; --schlecht-bg:#FEF2F2;

  --radius:   12px;
  --radius-sm: 7px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html { scroll-behavior: smooth; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
       background: var(--paper3); color: var(--ink); font-size:14px; line-height:1.6; min-height:100vh; }

/* ── LANDING ── */
#landing {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2rem 1rem;
  background: var(--paper3);
}
.landing-logo {
  font-size: 13px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink3); margin-bottom: 2.5rem;
}
.landing-title {
  font-size: clamp(28px, 5vw, 44px); font-weight: 700; letter-spacing: -.03em;
  text-align: center; line-height: 1.15; margin-bottom: .75rem;
}
.landing-title span { color: var(--bilanz); }
.landing-sub {
  font-size: 15px; color: var(--ink2); text-align: center; margin-bottom: 3rem; max-width: 440px;
}
.module-cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1.25rem; width: 100%; max-width: 640px;
}
.module-card {
  background: var(--paper); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 1.75rem;
  cursor: pointer; transition: transform .18s, box-shadow .18s, border-color .18s;
  text-align: left; position: relative; overflow: hidden;
}
.module-card::before {
  content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity .18s;
}
.module-card.bilanz::before { background: var(--bilanz-light); }
.module-card.erfolg::before { background: var(--erfolg-light); }
.module-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.module-card.bilanz:hover { border-color: var(--bilanz); }
.module-card.erfolg:hover { border-color: var(--erfolg); }
.module-card:hover::before { opacity: 1; }
.module-card > * { position: relative; }
.mc-icon {
  width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 1rem;
}
.bilanz .mc-icon { background: var(--bilanz-light); }
.erfolg .mc-icon { background: var(--erfolg-light); }
.mc-title { font-size: 17px; font-weight: 700; letter-spacing: -.02em; margin-bottom: .35rem; }
.bilanz .mc-title { color: var(--bilanz); }
.erfolg .mc-title { color: var(--erfolg); }
.mc-desc { font-size: 12px; color: var(--ink2); line-height: 1.6; margin-bottom: 1.1rem; }
.mc-topics { display: flex; flex-wrap: wrap; gap: 5px; }
.mc-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; letter-spacing:.02em; }
.bilanz .mc-tag { background: var(--bilanz-mid); color: var(--bilanz); }
.erfolg .mc-tag { background: var(--erfolg-mid); color: var(--erfolg); }
.mc-arrow { position: absolute; top: 1.5rem; right: 1.5rem; font-size: 18px; color: var(--border2); transition: color .18s, transform .18s; }
.module-card:hover .mc-arrow { color: var(--ink2); transform: translateX(3px); }

/* ── APP SHELL ── */
#app { display: none; min-height: 100vh; flex-direction: column; }

/* TOPBAR */
.topbar {
  background: var(--paper); border-bottom: 1px solid var(--border);
  padding: 0 1.5rem; position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; height: 52px; gap: 1rem;
}
.tb-back {
  font-size: 12px; font-weight: 600; letter-spacing:.05em; text-transform: uppercase;
  color: var(--ink3); cursor: pointer; display: flex; align-items: center; gap: 5px;
  border: none; background: none; transition: color .15s;
}
.tb-back:hover { color: var(--ink); }
.tb-sep { width:1px; height:20px; background: var(--border); }
.tb-module { font-size: 13px; font-weight: 700; }
.tb-module.bilanz { color: var(--bilanz); }
.tb-module.erfolg { color: var(--erfolg); }

/* NAV TABS */
.navtabs {
  background: var(--paper); border-bottom: 1px solid var(--border);
  padding: 0 1.5rem; display: flex; overflow-x: auto; gap: 0;
}
.ntab {
  padding: 13px 18px; font-size: 13px; font-weight: 500; border: none; background: transparent;
  cursor: pointer; color: var(--ink2); border-bottom: 2px solid transparent; white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.ntab:hover { color: var(--ink); }
.ntab.active.bilanz-tab { color: var(--bilanz); border-bottom-color: var(--bilanz); }
.ntab.active.erfolg-tab { color: var(--erfolg); border-bottom-color: var(--erfolg); }

/* MAIN */
.main { max-width: 1100px; margin: 0 auto; padding: 1.75rem 1.5rem; }
.sec { display: none; }
.sec.active { display: block; }

/* CARDS */
.card {
  background: var(--paper); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.35rem; margin-bottom: 1rem;
  box-shadow: var(--shadow);
}
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px,1fr)); gap: 1rem; }
.card-accent-blue { border-top: 3px solid var(--bilanz); }
.card-accent-green { border-top: 3px solid var(--erfolg); }

/* TYPOGRAPHY */
.section-title {
  font-size: 22px; font-weight: 700; letter-spacing: -.03em; margin-bottom: .3rem;
}
.section-sub { font-size: 13px; color: var(--ink2); margin-bottom: 1.5rem; }
h3 { font-size: 15px; font-weight: 700; margin-bottom: .5rem; }
h4 { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--ink3); margin-bottom: .4rem; }
p.desc { font-size: 12px; color: var(--ink2); line-height: 1.65; }
.sep { height: 1px; background: var(--border); margin: .9rem 0; }

/* FORMULA */
.formula {
  background: #F0F4FF; border-left: 3px solid var(--bilanz);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: .6rem 1rem; font-family: 'SF Mono','Fira Code',monospace; font-size: 12px;
  color: var(--ink); margin: .6rem 0;
}
.formula.green { background: var(--erfolg-light); border-left-color: var(--erfolg); }
.richtwert { font-size: 11px; color: var(--ink3); margin-top: 3px; }

/* BADGES */
.badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:99px; letter-spacing:.03em; }
.b-gut     { background: var(--gut-bg);      color: var(--gut);     }
.b-mittel  { background: var(--mittel-bg);   color: var(--mittel);  }
.b-schlecht{ background: var(--schlecht-bg); color: var(--schlecht);}
.b-leicht  { background: #ECFDF5; color: #065F46; }
.b-schwer  { background: #FEF2F2; color: #B91C1C; }
.b-blue    { background: var(--bilanz-light); color: var(--bilanz); }
.b-green   { background: var(--erfolg-light); color: var(--erfolg); }

/* KPI GRID */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:1.25rem; }
.kpi { background: var(--paper2); border-radius: var(--radius-sm); padding:.85rem 1rem; }
.kpi-label { font-size:11px; color:var(--ink3); margin-bottom:3px; font-weight:500; }
.kpi-val { font-size:20px; font-weight:700; letter-spacing:-.02em; }

/* TABLE */
.kz-table { width:100%; border-collapse:collapse; font-size:12px; }
.kz-table th { text-align:left; padding:7px 8px; border-bottom:2px solid var(--border); color:var(--ink3); font-weight:700; font-size:10px; text-transform:uppercase; letter-spacing:.06em; }
.kz-table td { padding:8px 8px; border-bottom:1px solid var(--border); vertical-align:middle; }
.kz-table tr:last-child td { border-bottom:none; }
.kz-table td:first-child { font-weight:600; }
.mono { font-family:'SF Mono','Fira Code',monospace; font-size:11px; color:var(--ink2); }

/* INPUTS */
input[type=number], input[type=text] {
  border:1px solid var(--border2); border-radius:var(--radius-sm);
  padding:6px 10px; font-size:13px; background:var(--paper); color:var(--ink); outline:none;
  transition: border-color .15s;
}
input:focus { border-color: var(--bilanz); }
.input-label { font-size:11px; color:var(--ink2); margin-bottom:3px; font-weight:600; }
.input-group { margin-bottom:10px; }

/* RESULT ROWS */
.result-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; }
.result-row:last-child { border-bottom:none; }
.result-name { color:var(--ink2); font-weight:500; }
.result-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
.result-val { font-weight:700; font-size:14px; }

/* YEAR TABS */
.yr-tabs { display:flex; gap:6px; margin-bottom:1rem; flex-wrap:wrap; }
.yr-tab {
  padding:6px 14px; font-size:12px; font-weight:600; border:1px solid var(--border2);
  border-radius:var(--radius-sm); cursor:pointer; background:var(--paper); color:var(--ink2);
  transition:all .12s;
}
.yr-tab:hover { background:var(--paper2); }
.yr-tab.active.bt { background:var(--bilanz); color:#fff; border-color:var(--bilanz); }
.yr-tab.active.et { background:var(--erfolg); color:#fff; border-color:var(--erfolg); }

/* FILTER / MODE BUTTONS */
.filter-row { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:.75rem; }
.fbtn {
  padding:5px 11px; font-size:11px; font-weight:600; border:1px solid var(--border);
  border-radius:99px; cursor:pointer; background:var(--paper); color:var(--ink2); transition:all .12s;
}
.fbtn:hover { background:var(--paper2); }
.fbtn.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
.mbtn {
  padding:7px 16px; font-size:12px; font-weight:600; border:1px solid var(--border2);
  border-radius:var(--radius-sm); cursor:pointer; background:var(--paper); color:var(--ink2); transition:all .12s;
}
.mbtn:hover { background:var(--paper2); }
.mbtn.active.bilanz-mb { background:var(--bilanz); color:#fff; border-color:var(--bilanz); }
.mbtn.active.erfolg-mb { background:var(--erfolg); color:#fff; border-color:var(--erfolg); }

/* PRIMARY BUTTON */
.btn-primary {
  padding:10px 24px; font-size:13px; font-weight:700; border:none;
  border-radius:var(--radius-sm); cursor:pointer; transition:opacity .15s; letter-spacing:.01em;
}
.btn-primary.bilanz-btn { background:var(--bilanz); color:#fff; }
.btn-primary.erfolg-btn { background:var(--erfolg); color:#fff; }
.btn-primary:hover { opacity:.85; }

/* PROGRESS */
.progress-bar { height:4px; background:var(--paper2); border-radius:2px; margin-bottom:1.25rem; overflow:hidden; }
.progress-fill { height:100%; border-radius:2px; transition:width .35s; }
.pf-bilanz { background:var(--bilanz); }
.pf-erfolg { background:var(--erfolg); }

/* QUIZ */
.quiz-q { font-size:15px; font-weight:600; margin-bottom:1rem; line-height:1.5; letter-spacing:-.01em; }
.quiz-opts { display:flex; flex-direction:column; gap:7px; margin-bottom:.9rem; }
.quiz-opt {
  padding:10px 14px; border:1px solid var(--border2); border-radius:var(--radius-sm);
  cursor:pointer; font-size:13px; background:var(--paper); color:var(--ink); text-align:left;
  transition:background .1s, border-color .1s;
}
.quiz-opt:hover:not(:disabled) { background:var(--paper2); }
.quiz-opt.correct { background:#F0FDF4; border-color:#16A34A; color:#15803D; font-weight:600; }
.quiz-opt.wrong   { background:#FEF2F2; border-color:#DC2626; color:#B91C1C; }
.quiz-opt:disabled { cursor:default; }
.qfb { font-size:13px; line-height:1.6; padding:10px 13px; border-radius:var(--radius-sm); display:none; }
.qfb.show { display:block; }
.qfb.ok  { background:#F0FDF4; color:#15803D; border:1px solid #BBF7D0; }
.qfb.nok { background:#FEF2F2; color:#B91C1C; border:1px solid #FCA5A5; }
.next-btn {
  margin-top:1rem; padding:8px 20px; border:1px solid var(--border2); border-radius:var(--radius-sm);
  cursor:pointer; font-size:13px; font-weight:600; background:var(--paper); color:var(--ink);
  transition:background .12s;
}
.next-btn:hover { background:var(--paper2); }
.q-counter { font-size:11px; color:var(--ink3); margin-bottom:.35rem; font-weight:500; }
.calc-q-box { background:var(--paper2); border-radius:var(--radius-sm); padding:10px 12px; font-size:12px; margin-bottom:.75rem; line-height:1.8; border-left:3px solid var(--border2); }
.calc-formula-tag { font-family:'SF Mono','Fira Code',monospace; font-size:11px; background:var(--paper2); border:1px solid var(--border); padding:3px 8px; border-radius:4px; display:inline-block; margin-bottom:.75rem; color:var(--ink2); }
.answer-input { border:1px solid var(--border2); border-radius:var(--radius-sm); padding:7px 10px; font-size:14px; width:110px; background:var(--paper); color:var(--ink); outline:none; }
.answer-input:focus { border-color:var(--bilanz); }
.check-btn { padding:7px 16px; border:1px solid var(--border2); border-radius:var(--radius-sm); cursor:pointer; font-size:12px; font-weight:600; background:var(--paper); color:var(--ink); }
.check-btn:hover { background:var(--paper2); }

/* SCORE */
.score-big { font-size:52px; font-weight:800; letter-spacing:-.05em; text-align:center; margin:1rem 0 .25rem; }
.score-sub { text-align:center; font-size:14px; color:var(--ink2); margin-bottom:1rem; }
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:.9rem 0; }
.stat { background:var(--paper2); border-radius:var(--radius-sm); padding:.85rem; text-align:center; }
.stat-val { font-size:24px; font-weight:800; }
.stat-lbl { font-size:11px; color:var(--ink2); margin-top:2px; font-weight:500; }

/* KRITIK */
.strengths ul, .weaknesses ul { font-size:12px; line-height:2; padding-left:1.1rem; }
.strengths ul li::marker { color: var(--gut); }
.weaknesses ul li::marker { color: var(--schlecht); }

/* ROI-BAUM */
.roi-baum { display:flex; align-items:center; gap:0; overflow-x:auto; padding:1rem 0; }
.roi-col { display:flex; flex-direction:column; align-items:center; gap:8px; min-width:100px; }
.roi-node {
  background:var(--paper); border:1.5px solid var(--border2); border-radius:8px;
  padding:8px 10px; text-align:center; font-size:11px; min-width:90px;
  box-shadow: var(--shadow);
}
.roi-node .lbl { font-size:9px; color:var(--ink3); font-weight:600; text-transform:uppercase; letter-spacing:.06em; margin-bottom:2px; }
.roi-node .val { font-size:15px; font-weight:800; letter-spacing:-.02em; }
.roi-node.highlight { border-color:var(--bilanz); background:var(--bilanz-light); }
.roi-node.highlight .val { color:var(--bilanz); }
.roi-conn { font-size:18px; color:var(--border2); padding:0 6px; align-self:center; }
.roi-op { font-size:13px; font-weight:700; color:var(--ink3); text-align:center; margin: 2px 0; }

/* LEVERAGE TABLE */
.lev-table { width:100%; border-collapse:collapse; font-size:12px; }
.lev-table th { background:var(--paper2); padding:8px 10px; text-align:left; font-size:11px; font-weight:700; color:var(--ink2); border-bottom:2px solid var(--border); }
.lev-table td { padding:8px 10px; border-bottom:1px solid var(--border); }
.lev-table tr:last-child td { border-bottom:none; font-weight:700; }
.lev-table .highlight-cell { color:var(--erfolg); font-weight:800; }

/* RESPONSIVE */
@media(max-width:600px){
  .main { padding:1rem; }
  .card-grid { grid-template-columns:1fr; }
  .topbar { padding:0 1rem; }
  .score-big { font-size:40px; }
}
</style>
</head>

function openModule(mod){

function buildNav(mod){

  if(mod==='bilanz'){
    nav.innerHTML=`
      <button class="ntab bilanz-tab active" onclick="showTab('b-theorie',this)">Theorie</button>
      <button class="ntab bilanz-tab" onclick="showTab('b-rechner',this)">Rechner</button>

    nav.innerHTML=`

      <button class="ntab erfolg-tab" onclick="showTab('e-quiz',this)">Quiz</button>`;
  }
  renderContent(mod);
}
function showTab(id,btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
  if(btn){
    document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
  }
  if(id==='b-rechner') calcAll();
  if(id==='b-eyelook'){const t=document.querySelector('.yr-tab.bt');showBYear(2,t);}
  if(id==='e-eyelook') renderErfolgChart();
}

<div id="e-cashflow" class="sec">

      <p class="desc">Anders als der JÜ (der durch überhöhte Abschreibungen künstlich klein gehalten werden kann) zeigt der Cashflow die <strong>wirkliche Ertragskraft</strong>, da nicht ausgabewirksame Aufwendungen wieder addiert werden.</p>

    </div>
  </div>
</div>

<div id="e-quiz" class="sec">

</div>
`;}

/* ═══════════════════════════════════════════════════════
   QUIZ LOGIC
═══════════════════════════════════════════════════════ */
function setMode(m,btn,mod){quizMode=m;btn.closest('div').querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function setFilter(f,btn,rowId){quizFilter=f;document.getElementById(rowId).querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function setDiff(d,btn,rowId){quizDiff=d;document.getElementById(rowId).querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function filtQ(pool){return pool.filter(q=>(quizFilter==='all'||q.t===quizFilter)&&(quizDiff==='all'||q.d===quizDiff));}

function startQuiz(mod){
  const id=mod==='bilanz'?'b':'e';
  const mcPool=mod==='bilanz'?mcQB:mcQE;
  const cPool=mod==='bilanz'?calcQB:calcQE;
  let pool=[];
  if(quizMode==='mc') pool=filtQ(mcPool);
  else if(quizMode==='calc') pool=filtQ(cPool);
  else pool=shuffle([...filtQ(mcPool),...filtQ(cPool)]);
  if(!pool.length){document.getElementById(id+'-quiz-container').innerHTML='<div class="card" style="color:var(--ink2);">Keine Fragen für diese Kombination. Andere Filter wählen.</div>';return;}
  aqList=shuffle(pool).slice(0,Math.min(pool.length,15));
  qIdx=0;score=0;answered=false;wrongQ=[];
  document.getElementById(id+'-quiz-score').style.display='none';
  document.getElementById(id+'-quiz-progress').style.width='0%';
  window._quizMod=mod;
  renderQ(mod);
}

function renderQ(mod){
  const id=mod==='bilanz'?'b':'e';
  const pfCls=mod==='bilanz'?'pf-bilanz':'pf-erfolg';
  const counter=document.getElementById(id+'-q-counter');
  counter.textContent=aqList.length?`Frage ${qIdx+1} von ${aqList.length}`:'';
  if(qIdx>=aqList.length){showScore(mod);return;}
  document.getElementById(id+'-quiz-progress').style.width=((qIdx/aqList.length)*100)+'%';
  const q=aqList[qIdx];answered=false;
  const isC=!!q.f;
  const db=q.d==='leicht'?'b-leicht':q.d==='mittel'?'b-mittel':'b-schwer';
  let html=`<div class="card"><div style="display:flex;gap:6px;align-items:center;margin-bottom:10px;"><span class="badge ${db}">${q.d}</span><span style="font-size:11px;color:var(--ink3);">${themeL[q.t]||q.t}</span></div><div class="quiz-q">${q.q}</div>`;
  if(isC){
    html+=`<div class="calc-q-box">${q.b}</div><div class="calc-formula-tag">${q.f}</div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:.5rem;"><input class="answer-input" type="number" id="calc-ans" step="0.1" placeholder="Ergebnis…"><span style="font-size:13px;color:var(--ink2);">${q.u}</span><button class="check-btn" onclick="checkC('${mod}')">Prüfen</button></div>`;
  } else {
    html+=`<div class="quiz-opts">`;
    q.o.forEach((op,i)=>{html+=`<button class="quiz-opt" id="opt-${i}" onclick="answerMC(${i},'${mod}')">${op}</button>`;});
    html+=`</div>`;
  }
  html+=`<div class="qfb" id="qfb"></div><button class="next-btn" id="next-q" style="display:none;" onclick="nextQ('${mod}')">Nächste Frage →</button></div>`;
  document.getElementById(id+'-quiz-container').innerHTML=html;
  if(isC){const inp=document.getElementById('calc-ans');if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkC(mod);});}
}

function answerMC(i,mod){
  if(answered)return;answered=true;
  const q=aqList[qIdx];
  document.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
  const fb=document.getElementById('qfb');
  if(i===q.a){document.getElementById('opt-'+i).classList.add('correct');fb.textContent='Richtig! '+q.e;fb.className='qfb show ok';score++;}
  else{document.getElementById('opt-'+i).classList.add('wrong');document.getElementById('opt-'+q.a).classList.add('correct');fb.textContent='Leider falsch. '+q.e;fb.className='qfb show nok';wrongQ.push(q);}
  document.getElementById('next-q').style.display='inline-block';
}
function checkC(mod){
  if(answered)return;
  const q=aqList[qIdx];const val=parseFloat(document.getElementById('calc-ans').value);
  if(isNaN(val))return;answered=true;
  document.getElementById('calc-ans').disabled=true;
  document.querySelector('.check-btn').disabled=true;
  const fb=document.getElementById('qfb');
  if(Math.abs(val-q.a)<=q.tol){fb.textContent='Richtig! '+q.e;fb.className='qfb show ok';score++;}
  else{fb.textContent='Falsch. Richtig: '+q.a.toFixed(q.u==='€'?0:1)+' '+q.u+'. '+q.e;fb.className='qfb show nok';wrongQ.push(q);}
  document.getElementById('next-q').style.display='inline-block';
}
function nextQ(mod){qIdx++;renderQ(mod);}

function showScore(mod){
  const id=mod==='bilanz'?'b':'e';
  document.getElementById(id+'-quiz-container').innerHTML='';
  document.getElementById(id+'-quiz-progress').style.width='100%';
  document.getElementById(id+'-q-counter').textContent='';
  const tot=aqList.length,pct=Math.round(score/tot*100);
  const msg=pct>=85?'Ausgezeichnet — Abitur-ready!':pct>=70?'Sehr gut! Noch kleine Lücken.':pct>=50?'Gut — gezielt üben.':'Grundlagen nochmals durchgehen.';
  let html=`<div class="score-big">${score} / ${tot}</div><div class="score-sub">${pct} % — ${msg}</div>
  <div class="stat-grid">
    <div class="stat"><div class="stat-val" style="color:var(--gut)">${score}</div><div class="stat-lbl">Richtig</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--schlecht)">${tot-score}</div><div class="stat-lbl">Falsch</div></div>
    <div class="stat"><div class="stat-val">${pct} %</div><div class="stat-lbl">Quote</div></div>
  </div>`;
  if(wrongQ.length){
    html+=`<div style="margin-top:1rem;"><div style="font-size:12px;font-weight:700;margin-bottom:.6rem;color:var(--ink2);">Falsch beantwortet — zum Nachlernen:</div>`;
    wrongQ.forEach(q=>{const db=q.d==='leicht'?'b-leicht':q.d==='mittel'?'b-mittel':'b-schwer';html+=`<div style="border-top:1px solid var(--border);padding:9px 0;"><div style="display:flex;gap:5px;margin-bottom:3px;"><span class="badge ${db}">${q.d}</span><span style="font-size:11px;color:var(--ink3);">${themeL[q.t]||q.t}</span></div><div style="font-size:12px;font-weight:600;margin-bottom:3px;">${q.q}</div><div style="font-size:12px;color:var(--gut);">${q.e}</div></div>`;});
    html+=`</div>`;
  }
  const btnCls=mod==='bilanz'?'bilanz-btn':'erfolg-btn';
  html+=`<button class="btn-primary ${btnCls}" style="margin-top:1.25rem;" onclick="startQuiz('${mod}')">Nochmal</button>`;
  const sc=document.getElementById(id+'-quiz-score');sc.innerHTML=html;sc.style.display='block';
}
</script>
</body>
</html>
